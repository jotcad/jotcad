<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JotCAD Web Viewer</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
    <script
      async
      src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "jotcad-viewer": "./jot_threejs_viewer.js",
          "jotcad-main": "./main.js"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>
  </head>
  <body>
    <div
      id="loadingIndicator"
      style="
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 200;
        background-color: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 20px;
        border-radius: 10px;
        display: none;
      "
    >
      Loading...
    </div>
    <div style="position: absolute; top: 10px; left: 10px; z-index: 100">
      <span
        id="releaseNumber"
        style="font-weight: bold; margin-bottom: 10px; display: block"
      ></span>
      Server Address:
      <input
        type="text"
        id="serverAddress"
        value="http://localhost:3000"
        style="background-color: rgba(255, 255, 255, 0.8); width: 300px"
      /><br />
      Session ID:
      <input
        type="text"
        id="sessionId"
        value="defaultSession"
        style="background-color: rgba(255, 255, 255, 0.8); width: 300px"
      /><br />
      Output Filename:
      <input
        type="text"
        id="outputFilename"
        value="out.jot"
        style="background-color: rgba(255, 255, 255, 0.8); width: 300px"
      /><br /><br />
      <textarea
        id="codeEditor"
        rows="10"
        cols="50"
        style="background-color: rgba(255, 255, 255, 0.8)"
      ></textarea
      ><br />
      <button id="renderButton">Render Code</button><br /><br />
      <div id="fileListContainer" style="margin-top: 10px">
        <strong>Available Files:</strong>
        <ul
          id="fileList"
          style="list-style: none; padding: 0; margin-top: 5px"
        ></ul>
      </div>
    </div>
    <div
      style="
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 100;
        text-align: right;
        background-color: rgba(255, 255, 255, 0.5);
        padding: 10px;
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      "
    >
      <div id="orientationGuide" style="width: 100px; height: 100px"></div>
      <div>
        Rotation Speed:
        <input
          type="range"
          id="rotateSpeed"
          min="0.1"
          max="10"
          step="0.1"
          value="1.0"
          style="width: 100px; vertical-align: middle"
        />
        <span id="rotateSpeedValue" style="width: 25px; display: inline-block"
          >1.0</span
        >
      </div>
      <div>
        Zoom Speed:
        <input
          type="range"
          id="zoomSpeed"
          min="0.1"
          max="5"
          step="0.1"
          value="1.2"
          style="width: 100px; vertical-align: middle"
        />
        <span id="zoomSpeedValue" style="width: 25px; display: inline-block"
          >1.2</span
        >
      </div>
      <div>
        Pan Speed:
        <input
          type="range"
          id="panSpeed"
          min="0.1"
          max="5"
          step="0.1"
          value="0.8"
          style="width: 100px; vertical-align: middle"
        />
        <span id="panSpeedValue" style="width: 25px; display: inline-block"
          >0.8</span
        >
      </div>
      <div>
        Edge Threshold:
        <input
          type="range"
          id="edgeThreshold"
          min="0"
          max="90"
          step="1"
          value="1"
          style="width: 100px; vertical-align: middle"
        />
        <span id="edgeThresholdValue" style="width: 25px; display: inline-block"
          >1</span
        >
      </div>
      <div>
        FOV:
        <input
          type="range"
          id="fov"
          min="1"
          max="120"
          step="1"
          value="45"
          style="width: 100px; vertical-align: middle"
        />
        <span id="fovValue" style="width: 25px; display: inline-block">45</span>
      </div>
      <div>
        Projection:
        <select
          id="projectionType"
          style="background-color: rgba(255, 255, 255, 0.8)"
        >
          <option value="orthographic">Orthographic</option>
          <option value="perspective">Perspective</option>
        </select>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
