<!DOCTYPE html>
<html>
<head>
    <title>Hexagon Render Test</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; }
        #viewport { width: 512px; height: 512px; border: 1px solid red; }
    </style>
</head>
<body>
    <canvas id="viewport"></canvas>
    <script type="module">
        import * as THREE from 'three';
        import { 
            initSharedRenderer, 
            renderJotToScene, 
            updateViewports, 
            registerViewport,
            createScene
        } from '../src/lib/three_utils.js';

        const ZFS_DATA = `
=196 files/main.json
{"geometry":{"parameters":{"cid":"6eeeab6b340af9ff69e9c0ab6097e0d405bc8cdaa2ba39ace929dcffc0711ae4"},"path":"geo/mesh"},"parameters":{"diameter":30},"tags":[["type","hexagon",["variant","full"]]]}
=516 assets/text/geo/mesh?{"cid":"6eeeab6b340af9ff69e9c0ab6097e0d405bc8cdaa2ba39ace929dcffc0711ae4"}
v 15.0000000000 0.0000000000 0.0000000000 15.0000000000 0.0000000000 0.0000000000
v 7.5000000000 12.9903810568 0.0000000000 7.5000000000 12.9903810568 0.0000000000
v -7.5000000000 12.9903810568 0.0000000000 -7.5000000000 12.9903810568 0.0000000000
v -15.0000000000 0.0000000000 0.0000000000 -15.0000000000 0.0000000000 0.0000000000
v -7.5000000000 -12.9903810568 0.0000000000 -7.5000000000 -12.9903810568 0.0000000000
v 7.5000000000 -12.9903810568 0.0000000000 7.5000000000 -12.9903810568 0.0000000000
f 0 1 2 3 4 5
`.trim();

        async function run() {
            const renderer = initSharedRenderer();
            document.body.appendChild(renderer.domElement);
            renderer.domElement.style.pointerEvents = 'auto';

            const scene = createScene();
            scene.background = new THREE.Color(0x222222); // Dark grey background
            
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(30, 30, 30);
            camera.lookAt(0, 0, 0);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const dl = new THREE.DirectionalLight(0xffffff, 0.8);
            dl.position.set(10, 10, 10);
            scene.add(dl);

            const viewportCanvas = document.getElementById('viewport');
            registerViewport('test-hexagon', viewportCanvas, scene, camera);

            console.log('[Test] Rendering Hexagon...');
            await renderJotToScene(null, ZFS_DATA, scene);
            
            // Loop update for a few frames to ensure render
            let frames = 0;
            function animate() {
                updateViewports();
                frames++;
                if (frames < 10) {
                    requestAnimationFrame(animate);
                } else {
                    console.log('[Test] Render Complete');
                    window.RENDER_COMPLETE = true;
                }
            }
            animate();
        }

        run().catch(console.error);
    </script>
</body>
</html>
