<!DOCTYPE html>
<html>
<head>
    <title>Offset Render Test</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; }
        #viewport { width: 512px; height: 512px; }
    </style>
</head>
<body>
    <div id="viewport"></div>
    <script type="module">
        import * as THREE from 'three';
        import { 
            getSharedRenderer, 
            renderJotToScene, 
            activateViewport
        } from '../src/lib/three_utils.js';

        // Simplified ZFS data for a square with hole (offset result)
        const ZFS_DATA = `
=238 files/main.json
{"geometry":"assets/text/geo/mesh","tags":{"type":"surface"}}
=416 assets/text/geo/mesh
v -15.0 -15.0 0.0
v 15.0 -15.0 0.0
v 15.0 15.0 0.0
v -15.0 15.0 0.0
v -10.0 -10.0 0.0
v 10.0 -10.0 0.0
v 10.0 10.0 0.0
v -10.0 10.0 0.0
F 2 1 4 0 1 2 3 1 4 7 6 5 4
`.trim();

        async function run() {
            const renderer = getSharedRenderer();
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); 
            
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(40, 40, 40);
            camera.lookAt(0, 0, 0);

            const viewportContainer = document.getElementById('viewport');
            activateViewport('test-offset', viewportContainer, scene, camera);

            console.log('[Test] Rendering Offset...');
            await renderJotToScene(null, ZFS_DATA, scene);
            
            let frames = 0;
            function animate() {
                frames++;
                if (frames < 20) {
                    requestAnimationFrame(animate);
                } else {
                    console.log('[Test] Render Complete');
                    window.RENDER_COMPLETE = true;
                }
            }
            animate();
        }

        run().catch(console.error);
    </script>
</body>
</html>
