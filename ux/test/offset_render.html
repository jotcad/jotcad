        async function run() {
            const renderer = initSharedRenderer();
            document.body.appendChild(renderer.domElement);
            renderer.domElement.style.pointerEvents = 'auto';

            const scene = createScene();
            scene.background = new THREE.Color(0x222222); 
            
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(40, 40, 40);
            camera.lookAt(0, 0, 0);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const dl = new THREE.DirectionalLight(0xffffff, 0.8);
            dl.position.set(10, 10, 10);
            scene.add(dl);

            const viewportCanvas = document.getElementById('viewport');
            registerViewport('test-offset', viewportCanvas, scene, camera);

            console.log('[Test] Rendering Hexagon Offset...');
            await renderJotToScene(null, ZFS_DATA, scene);
            
            let frames = 0;
            function animate() {
                updateViewports();
                frames++;
                if (frames < 15) {
                    requestAnimationFrame(animate);
                } else {
                    console.log('[Test] Render Complete');
                    window.RENDER_COMPLETE = true;
                }
            }
            animate();
        }

        run().catch(console.error);
