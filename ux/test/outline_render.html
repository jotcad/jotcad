<!DOCTYPE html>
<html>
<head>
    <title>Outline Render Test</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; }
        #viewport { width: 512px; height: 512px; }
    </style>
</head>
<body>
    <div id="viewport"></div>
    <script type="module">
        import * as THREE from 'three';
        import { 
            getSharedRenderer, 
            renderJotToScene, 
            activateViewport
        } from '../src/lib/three_utils.js';

        // Result of outline (segments)
        const ZFS_DATA = `
=238 files/main.json
{"geometry":"assets/text/geo/mesh","tags":{"type":"segments"}}
=256 assets/text/geo/mesh
v 0 0 0
v 10 0 0
v 10 10 0
v 0 10 0
S 4
0 1
1 2
2 3
3 0
`.trim();

        async function run() {
            const renderer = getSharedRenderer();
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222); 
            
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            camera.position.set(20, 20, 20);
            camera.lookAt(5, 5, 0);

            const viewportContainer = document.getElementById('viewport');
            activateViewport('test-outline', viewportContainer, scene, camera);

            console.log('[Test] Rendering Outline...');
            await renderJotToScene(null, ZFS_DATA, scene);
            
            let frames = 0;
            function animate() {
                frames++;
                if (frames < 20) {
                    requestAnimationFrame(animate);
                } else {
                    console.log('[Test] Render Complete');
                    window.RENDER_COMPLETE = true;
                }
            }
            animate();
        }

        run().catch(console.error);
    </script>
</body>
</html>
