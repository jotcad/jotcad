<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JotCAD Regression Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #090d16;
            --panel-bg: rgba(13, 20, 35, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.18);
            --fail: #f43f5e;
            --fail-glow: rgba(244, 63, 94, 0.18);
            --gold: #f59e0b;
            
            --font: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(56, 189, 248, 0.03) 0px, transparent 50%);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
        }

        .title-area h1 {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 30%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        .title-area p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .btn-refresh {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-refresh:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-hover);
        }

        main {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .profile-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(12px);
            align-items: center;
        }

        @media (min-width: 992px) {
            .profile-row {
                grid-template-columns: 1.25fr 1fr;
            }
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .profile-name {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-badge.passed {
            border-color: var(--success);
            color: var(--success);
            background: var(--success-glow);
        }
        .status-badge.passed .status-indicator {
            background-color: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .status-badge.failed {
            border-color: var(--fail);
            color: var(--fail);
            background: var(--fail-glow);
        }
        .status-badge.failed .status-indicator {
            background-color: var(--fail);
            box-shadow: 0 0 6px var(--fail);
        }

        .profile-params {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            display: flex;
            gap: 1.5rem;
        }

        .profile-params strong {
            color: var(--text);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .metric-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border);
            padding: 0.9rem 1.2rem;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-value-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .metric-val {
            font-size: 1.15rem;
            font-weight: 700;
            font-family: var(--mono);
        }

        .delta-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-family: var(--mono);
        }

        .delta-badge.match {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .delta-badge.success {
            background: var(--success-glow);
            color: var(--success);
        }

        .delta-badge.error {
            background: var(--fail-glow);
            color: var(--fail);
        }

        /* Image Display Column */
        .image-column {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 1778 / 912;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #020408;
            cursor: pointer;
        }

        .image-column:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .top-view-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-overlay-label {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            pointer-events: none;
        }

        footer {
            margin-top: 5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 2rem;
            width: 100%;
            max-width: 1200px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="title-area">
            <h1>JotCAD Regression Visualizer</h1>
            <p>Verification & physical parameter drift analysis (v4.6.0-arable)</p>
        </div>
        <button class="btn-refresh" onclick="loadStats()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            Refresh
        </button>
    </header>

    <main id="profiles-container">
        <!-- Profile rows will be injected dynamically here -->
        <div class="profile-row" id="row-subtropical-highland">
            <div class="profile-info">
                <div class="profile-header">
                    <div class="profile-name">Subtropical Highland</div>
                    <div id="status-badge" class="status-badge">
                        <span class="status-indicator"></span>
                        <span class="status-text">Loading...</span>
                    </div>
                </div>

                <div class="profile-params">
                    <span>Rainfall: <strong>1.4 m/yr</strong></span>
                    <span>Base Temp: <strong>25°C</strong></span>
                    <span>Lapse Divisor: <strong>85 m/°C</strong></span>
                </div>

                <div class="metrics-grid" id="metrics-grid">
                    <!-- Populated by JavaScript -->
                </div>
            </div>

            <!-- Final Top View Column -->
            <a href="./hex_frames/frame_1000.png" target="_blank" class="image-column">
                <img src="./hex_frames/frame_1000.png" alt="Subtropical Highland Top View" class="top-view-img">
                <div class="image-overlay-label">FINAL TOP VIEW (1000K YR)</div>
            </a>
        </div>
    </main>

    <footer>
        <p>JotCAD Web VFS System &bull; Ports: 8085 (HTTPS) &bull; Core: C++ Simulation Engine</p>
    </footer>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('./hex_regression_stats.json?' + new Date().getTime());
                if (!response.ok) throw new Error("JSON file load failed");
                const data = await response.json();

                // 1. Update Status Badge
                const statusBadge = document.getElementById('status-badge');
                const statusText = statusBadge.querySelector('.status-text');
                statusBadge.className = 'status-badge ' + data.status.toLowerCase();
                statusText.textContent = 'REGRESSION: ' + data.status;

                // 2. Populate metrics grid
                const metricsGrid = document.getElementById('metrics-grid');
                metricsGrid.innerHTML = '';

                const fields = [
                    { key: 'final_soil_volume', label: 'Final Soil Mass', format: 'e', tol: 0.001 },
                    { key: 'net_mass_change', label: 'Net Soil Drift', format: 'f', suffix: ' m', tol: 0.001 },
                    { key: 'avg_vegetation_cover', label: 'Avg Vegetation', format: 'pct', suffix: '%', tol: 0.005 },
                    { key: 'max_river_discharge', label: 'Max River Flow', format: 'f', suffix: ' m³/s', tol: 0.005 },
                    { key: 'active_river_cells', label: 'Active River Cells', format: 'int', tol: 10 },
                    { key: 'pixel_deviation', label: 'Pixel Mismatch', format: 'dev', suffix: '%', tol: 0.1 }
                ];

                fields.forEach(field => {
                    let baseVal = 0, currVal = 0;
                    
                    if (field.key === 'pixel_deviation') {
                        baseVal = 0;
                        currVal = data.mismatch_percentage;
                    } else {
                        baseVal = data.baseline[field.key];
                        currVal = data.current[field.key];
                    }
                    
                    let currStr = '';
                    let diffVal = currVal - baseVal;
                    let relDiff = baseVal !== 0.0 ? diffVal / Math.abs(baseVal) : diffVal;
                    
                    if (field.format === 'e') {
                        currStr = currVal.toExponential(3);
                    } else if (field.format === 'pct' || field.format === 'dev') {
                        currStr = currVal.toFixed(3) + (field.suffix || '');
                    } else if (field.format === 'int') {
                        currStr = Math.round(currVal).toLocaleString();
                    } else {
                        currStr = currVal.toFixed(2) + (field.suffix || '');
                    }

                    // Delta badge styling
                    let deltaClass = 'match';
                    let deltaText = '0.00%';
                    
                    if (field.key === 'pixel_deviation') {
                        if (currVal > field.tol) {
                            deltaClass = 'error';
                            deltaText = currVal.toFixed(3) + '%';
                        } else if (currVal > 0) {
                            deltaClass = 'success';
                            deltaText = currVal.toFixed(3) + '%';
                        } else {
                            deltaText = 'Match';
                        }
                    } else if (field.format === 'int') {
                        const cellDiff = Math.abs(currVal - baseVal);
                        if (cellDiff > field.tol) {
                            deltaClass = 'error';
                            deltaText = (diffVal > 0 ? '+' : '') + Math.round(diffVal);
                        } else if (cellDiff > 0) {
                            deltaClass = 'success';
                            deltaText = (diffVal > 0 ? '+' : '') + Math.round(diffVal);
                        } else {
                            deltaText = 'Match';
                        }
                    } else {
                        const absRelDiff = Math.abs(relDiff);
                        if (absRelDiff > field.tol) {
                            deltaClass = 'error';
                            deltaText = (relDiff > 0 ? '+' : '') + (relDiff * 100.0).toFixed(3) + '%';
                        } else if (absRelDiff > 0) {
                            deltaClass = 'success';
                            deltaText = (relDiff > 0 ? '+' : '') + (relDiff * 100.0).toFixed(3) + '%';
                        } else {
                            deltaText = 'Match';
                        }
                    }

                    const item = document.createElement('div');
                    item.className = 'metric-item';
                    item.innerHTML = `
                        <span class="metric-label">${field.label}</span>
                        <div class="metric-value-row">
                            <div class="metric-val">${currStr}</div>
                            <span class="delta-badge ${deltaClass}">${deltaText}</span>
                        </div>
                    `;
                    metricsGrid.appendChild(item);
                });

            } catch (err) {
                console.error("Failed to load statistics:", err);
                const statusBadge = document.getElementById('status-badge');
                const statusText = statusBadge.querySelector('.status-text');
                statusBadge.className = 'status-badge failed';
                statusText.textContent = 'STATS DISCONNECTED';
            }
        }

        // Initialize loading
        loadStats();
    </script>
</body>
</html>
