<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
        window.addEventListener('error', function(e) {
            let errDiv = document.getElementById('error-overlay');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.id = 'error-overlay';
                errDiv.style.position = 'fixed';
                errDiv.style.bottom = '20px';
                errDiv.style.right = '20px';
                errDiv.style.width = '480px';
                errDiv.style.background = 'rgba(239, 68, 68, 0.95)';
                errDiv.style.color = '#ffffff';
                errDiv.style.padding = '20px';
                errDiv.style.borderRadius = '8px';
                errDiv.style.fontFamily = 'monospace';
                errDiv.style.fontSize = '12px';
                errDiv.style.boxShadow = '0 20px 25px -5px rgba(0, 0, 0, 0.7)';
                errDiv.style.zIndex = '999999';
                errDiv.style.whiteSpace = 'pre-wrap';
                errDiv.style.border = '2px solid #f87171';
                errDiv.style.maxHeight = '80vh';
                errDiv.style.overflowY = 'auto';
                document.documentElement.appendChild(errDiv);
            }
            errDiv.textContent = `🚨 [Browser JS Error]\n\nMessage: ${e.message || 'Script load failure / CORS error'}\nFile: ${e.filename || 'N/A'}\nLine/Col: ${e.lineno || 'N/A'}:${e.colno || 'N/A'}\n\nStack Trace:\n${e.error ? e.error.stack : 'N/A'}`;
        }, true);
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continental Shelf Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --grid-line: rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            max-width: 800px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .visualization-container {
            width: 100%;
            aspect-ratio: 1;
            background: #030712;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .controls {
            grid-column: span 2;
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        @media (max-width: 900px) {
            .controls {
                grid-column: span 1;
            }
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            box-shadow: none;
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .telemetry {
            grid-column: span 2;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 900px) {
            .telemetry {
                grid-column: span 1;
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/index.html" class="back-link">&larr; Back to Gallery</a>
        <h1>Continental Shelf & Slope</h1>
        <p class="subtitle">Shallow marine margin displaying delta progradation and slope gully incisions</p>
    </header>

    <div class="dashboard">
        <!-- 2D Top View -->
        <div class="card">
            <div class="card-title">2D Topographic Bathymetry Map</div>
            <div class="visualization-container">
                <svg id="grid-svg" viewBox="0 0 1000 1000"></svg>
            </div>
        </div>

        <!-- 3D Isometric View -->
        <div class="card">
            <div class="card-title">3D Isometric View</div>
            <div class="visualization-container">
                <svg id="iso-svg" viewBox="0 0 1000 650"></svg>
            </div>
        </div>

        <!-- Telemetry -->
        <div class="telemetry">
            <span>Simulation Step: <strong id="step-txt" style="color: var(--accent-color);">0</strong></span>
            <span>Coast Shoreline: <strong style="color: #10b981;">x = 20 (25%)</strong></span>
            <span>Shelf Break: <strong style="color: #fbbf24;">x = 48 (60%)</strong></span>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="play-btn">Play Co-Evolution</button>
            <button id="final-btn" class="secondary">Show Final State</button>
        </div>
    </div>

    <script type="module">
        import { shelfData } from './test_shelf.js';

        const GRID_SIZE = shelfData.grid_size || 80;
        const CELL_SIZE = 1000 / GRID_SIZE;

        let stepIndex = 0;
        const totalSteps = shelfData.steps.length - 1;
        let playInterval = null;

        const gridSvg = document.getElementById('grid-svg');
        const isoSvg = document.getElementById('iso-svg');
        const stepTxt = document.getElementById('step-txt');
        const playBtn = document.getElementById('play-btn');
        const finalBtn = document.getElementById('final-btn');

        function renderState(idx) {
            stepIndex = idx;
            stepTxt.textContent = idx;

            // Render 2D View
            gridSvg.innerHTML = '';
            const stepData = shelfData.steps[idx];

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const H = stepData.grid_H_soil[y][x];
                    const h_w = stepData.grid_h_surface[y][x];
                    const total_h = H + h_w;

                    // Hillshade slope calculation
                    const h_L = x > 0 ? (stepData.grid_H_soil[y][x-1] + stepData.grid_h_surface[y][x-1]) : H;
                    const h_R = x < GRID_SIZE - 1 ? (stepData.grid_H_soil[y][x+1] + stepData.grid_h_surface[y][x+1]) : H;
                    const h_T = y > 0 ? (stepData.grid_H_soil[y-1][x] + stepData.grid_h_surface[y-1][x]) : H;
                    const h_B = y < GRID_SIZE - 1 ? (stepData.grid_H_soil[y+1][x] + stepData.grid_h_surface[y+1][x]) : H;

                    const dx = h_R - h_L;
                    const dy = h_B - h_T;
                    const shadow = 1.0 + 0.45 * dx + 0.45 * dy;
                    const shade = Math.max(0.4, Math.min(1.6, shadow));

                    let r = 70, g = 80, b = 95; // Bedrock base

                    if (h_w > 0.05) {
                        // Subaqueous Bathymetry (marine blue depth gradient)
                        // Deep water is dark blue, shallow shelf is turquoise
                        const depth = Math.max(0, Math.min(5.0, h_w));
                        const depth_t = depth / 5.0; // 0.0 (shallow) to 1.0 (deep)

                        r = Math.round((2 * (1 - depth_t) + 4 * depth_t) * shade);
                        g = Math.round((147 * (1 - depth_t) + 18 * depth_t) * shade);
                        b = Math.round((219 * (1 - depth_t) + 48 * depth_t) * shade);
                    } else {
                        // Subaerial Terrain (sloping shore mountains)
                        const height_t = Math.max(0.0, H) / 3.0; // 0.0 to 1.0
                        r = Math.round((100 + 80 * height_t) * shade);
                        g = Math.round((105 + 75 * height_t) * shade);
                        b = Math.round((115 + 70 * height_t) * shade);
                    }

                    r = Math.max(0, Math.min(255, r));
                    g = Math.max(0, Math.min(255, g));
                    b = Math.max(0, Math.min(255, b));

                    const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                    rect.setAttribute("x", x * CELL_SIZE);
                    rect.setAttribute("y", y * CELL_SIZE);
                    rect.setAttribute("width", CELL_SIZE);
                    rect.setAttribute("height", CELL_SIZE);
                    rect.setAttribute("fill", `rgb(${r}, ${g}, ${b})`);
                    rect.setAttribute("stroke", "var(--grid-line)");
                    gridSvg.appendChild(rect);
                }
            }

            renderIso(idx);
        }

        function renderIso(idx) {
            isoSvg.innerHTML = '';
            const stepData = shelfData.steps[idx];
            const H_soil = stepData.grid_H_soil;
            const h_surf = stepData.grid_h_surface;

            // Height mapping for points
            const V_soil = Array.from({length: GRID_SIZE + 1}, () => new Float32Array(GRID_SIZE + 1));
            const V_water = Array.from({length: GRID_SIZE + 1}, () => new Float32Array(GRID_SIZE + 1));

            for (let y = 0; y <= GRID_SIZE; y++) {
                for (let x = 0; x <= GRID_SIZE; x++) {
                    let count = 0;
                    let sumSoil = 0;
                    let sumWater = 0;

                    for (let dy = -1; dy <= 0; dy++) {
                        for (let dx = -1; dx <= 0; dx++) {
                            const cy = y + dy;
                            const cx = x + dx;
                            if (cy >= 0 && cy < GRID_SIZE && cx >= 0 && cx < GRID_SIZE) {
                                sumSoil += H_soil[cy][cx];
                                sumWater += (H_soil[cy][cx] + h_surf[cy][cx]);
                                count++;
                            }
                        }
                    }
                    V_soil[y][x] = sumSoil / count;
                    V_water[y][x] = sumWater / count;
                }
            }

            function project(x, y, z) {
                const spacing = 5.2;
                const heightScale = 22;
                const px = 500 + (x - y) * 0.866 * spacing;
                const py = 150 + (x + y) * 0.5 * spacing - z * heightScale;
                return { x: px, y: py };
            }

            const hexColor = (r, g, b) => "#" + [r, g, b].map(v => Math.max(0, Math.min(255, v)).toString(16).padStart(2, '0')).join('');

            // Draw quads back-to-front
            for (let sum = 0; sum <= 2 * (GRID_SIZE - 1); sum++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const y = sum - x;
                    if (y >= 0 && y < GRID_SIZE) {
                        const zSoilA = V_soil[y][x];
                        const zSoilB = V_soil[y][x+1];
                        const zSoilC = V_soil[y+1][x+1];
                        const zSoilD = V_soil[y+1][x];

                        const zWaterA = V_water[y][x];
                        const zWaterB = V_water[y][x+1];
                        const zWaterC = V_water[y+1][x+1];
                        const zWaterD = V_water[y+1][x];

                        // Slopes
                        const dx = zWaterB - zWaterA;
                        const dy = zWaterD - zWaterA;
                        const shadow = 1.0 + 0.45 * dx + 0.45 * dy;
                        const shade = Math.max(0.4, Math.min(1.6, shadow));

                        // Bedrock base color
                        let r = 70, g = 80, b = 95;

                        // Is under sea?
                        const h_w = h_surf[y][x];
                        if (h_w > 0.05) {
                            const depth_t = Math.max(0.0, Math.min(5.0, h_w)) / 5.0;
                            r = Math.round((2 * (1 - depth_t) + 4 * depth_t) * shade);
                            g = Math.round((147 * (1 - depth_t) + 18 * depth_t) * shade);
                            b = Math.round((219 * (1 - depth_t) + 48 * depth_t) * shade);
                        } else {
                            const height_t = Math.max(0.0, H_soil[y][x]) / 3.0;
                            r = Math.round((100 + 80 * height_t) * shade);
                            g = Math.round((105 + 75 * height_t) * shade);
                            b = Math.round((115 + 70 * height_t) * shade);
                        }

                        const pA = project(x, y, zWaterA);
                        const pB = project(x + 1, y, zWaterB);
                        const pC = project(x + 1, y + 1, zWaterC);
                        const pD = project(x, y + 1, zWaterD);

                        const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                        poly.setAttribute("points", `${pA.x.toFixed(1)},${pA.y.toFixed(1)} ${pB.x.toFixed(1)},${pB.y.toFixed(1)} ${pC.x.toFixed(1)},${pC.y.toFixed(1)} ${pD.x.toFixed(1)},${pD.y.toFixed(1)}`);
                        poly.setAttribute("fill", hexColor(r, g, b));
                        poly.setAttribute("stroke", h_w > 0.05 ? "rgba(56, 189, 248, 0.2)" : "rgba(71, 85, 105, 0.25)");
                        poly.setAttribute("stroke-width", "0.5");
                        isoSvg.appendChild(poly);
                    }
                }
            }
        }

        function playSimulation() {
            if (stepIndex >= totalSteps) stepIndex = 0;
            playInterval = setInterval(() => {
                if (stepIndex >= totalSteps) {
                    clearInterval(playInterval);
                    playInterval = null;
                    playBtn.textContent = "Play Co-Evolution";
                } else {
                    stepIndex++;
                    renderState(stepIndex);
                }
            }, 80);
        }

        playBtn.addEventListener('click', () => {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
                playBtn.textContent = "Play Co-Evolution";
            } else {
                playBtn.textContent = "Pause";
                playSimulation();
            }
        });

        finalBtn.addEventListener('click', () => {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
                playBtn.textContent = "Play Co-Evolution";
            }
            renderState(totalSteps);
        });

        renderState(0);
    </script>
</body>
</html>
