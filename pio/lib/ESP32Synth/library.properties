name=ESP32Synth
version=2.4.1
author=Danilo Gabriel
maintainer=Danilo Gabriel
sentence=Polyphonic synthesizer with 80+ voices/channels for the ESP32 dual core family, offering high-fidelity audio (48kHz @ 32bit).
paragraph=Transform your ESP32 dual-core microcontroller into a audio workstation. This extreme-performance synthesis engine delivers zero-latency I2S audio. It features multiple oscillator types, wavetables, non-blocking SD card WAV streaming, custom DSP effect hooks (like Reverb/Delay), native Lo-Fi bitcrushing, ADSR envelopes, LFOs, and an Arpeggiator. Built entirely with highly optimized fixed-point math to push the silicon to its absolute limits without starving FreeRTOS tasks.
category=Signal Input/Output
