[env:esp32_tdisplay_demo]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
    https://github.com/eclipse-zenoh/zenoh-pico.git
    https://github.com/nlohmann/json.git
    links2004/WebSockets@^2.4.1
    bodmer/TFT_eSPI@^2.5.43
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.flash_mode = dio
build_src_filter = +<esp32/*.cpp> +<esp32/tdisplay-demo/*.cpp>
build_flags = 
    -Isrc/esp32
    -Iinclude
    -std=gnu++17
    -fexceptions
    '-D DEVICE_NODE_ID="esp32-tdisplay-demo"'
    ; TFT_eSPI User Setup overrides for Tenstar T-Display (ST7789 135x240)
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=135
    -D TFT_HEIGHT=240
    -D CGRAM_OFFSET=1
    -D TFT_MOSI=19
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=16
    -D TFT_RST=23
    -D TFT_BL=4
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1

build_unflags = -std=gnu++11



board_build.partitions = huge_app.csv
