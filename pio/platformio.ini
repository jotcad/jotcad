; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_ldf_mode = deep+
lib_deps = 
    https://github.com/nlohmann/json.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
monitor_speed = 115200
build_src_filter = +<esp32/> +<esp32dev_counter_node/>
build_flags = 
    -Isrc/esp32
    -Iinclude
    -std=gnu++17
    -fexceptions
    -DDEVICE_NODE_ID='"${sysenv.DEVICE_NODE_ID}"'
build_unflags = -std=gnu++11

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
lib_ldf_mode = deep+
lib_deps = 
    https://github.com/nlohmann/json.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.flash_mode = qio
build_src_filter = +<esp32/> +<esp32cam_frame_node/>
build_flags = 
    -Isrc/esp32
    -Iinclude
    -std=gnu++17
    -fexceptions
    -DDEVICE_NODE_ID='"${sysenv.DEVICE_NODE_ID}"'
build_unflags = -std=gnu++11

[env:esp8266_time_display]
platform = espressif8266
board = d1_mini
framework = arduino
lib_ldf_mode = deep+
lib_deps = 
    https://github.com/nlohmann/json.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/ESPAsyncTCP.git
    https://github.com/avishorp/TM1637.git
monitor_speed = 115200
build_src_filter = +<esp8266/> +<esp8266_time_display_node/>
build_flags = 
    -Isrc/esp8266
    -Iinclude
    -std=gnu++17
    -fexceptions
    -DDEVICE_NODE_ID='"${sysenv.DEVICE_NODE_ID}"'
build_unflags = -std=gnu++11

