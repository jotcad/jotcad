[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
    https://github.com/nlohmann/json.git
    links2004/WebSockets@^2.4.1
    https://github.com/eclipse-zenoh/zenoh-pico.git
lib_ignore = FreeRTOS, freertos
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.flash_mode = qio
board_build.partitions = huge_app.csv
build_src_filter = +<esp32/*.cpp> +<esp32/counter_node/*.cpp>
build_flags = 
    -Isrc/esp32
    -Iinclude
    -std=gnu++17
    -fexceptions
    '-D DEVICE_NODE_ID="esp32-node"'

build_unflags = -std=gnu++11

