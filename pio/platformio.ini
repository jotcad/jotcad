[env:esp32_midi_reader]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

board_build.partitions = huge_app.csv
lib_deps = 
    https://github.com/nlohmann/json.git
    links2004/WebSockets@^2.4.1
    max22/ESP32-BLE-MIDI@^0.3.2
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.flash_mode = qio
build_src_filter = +<esp32/*.cpp> +<esp32/midi-reader/*.cpp>
build_flags = 
    -Isrc/esp32
    -Iinclude
    -std=gnu++17
    -fexceptions
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    '-D DEVICE_NODE_ID="esp32-midi-reader"'


build_unflags = -std=gnu++11

[env:esp32_dual_music_synth]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv
lib_deps = 
    https://github.com/nlohmann/json.git
    links2004/WebSockets@^2.4.1
    https://github.com/pschatzmann/ESP32-A2DP.git
    max22/ESP32-BLE-MIDI@0.2.2
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.flash_mode = dio
build_src_filter = +<esp32/*.cpp> +<esp32/dual-music-synth/*.cpp>
build_flags = 
    -Isrc/esp32
    -Iinclude
    -std=gnu++17
    -fexceptions
    '-D DEVICE_NODE_ID="esp32-dual-music-synth"'
    -D ESP_A2D_AUDIO_STATE_SUSPEND=ESP_A2D_AUDIO_STATE_REMOTE_SUSPEND
    -D CORE_DEBUG_LEVEL=3

build_unflags = -std=gnu++11


[env:esp32_tdisplay_demo]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps = 
    https://github.com/nlohmann/json.git
    links2004/WebSockets@^2.4.1
    bodmer/TFT_eSPI@^2.5.43
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.flash_mode = dio
build_src_filter = +<esp32/*.cpp> +<esp32/tdisplay-demo/*.cpp>
build_flags = 
    -Isrc/esp32
    -Iinclude
    -std=gnu++17
    -fexceptions
    '-D DEVICE_NODE_ID="esp32-tdisplay-demo"'
    ; TFT_eSPI User Setup overrides for Tenstar T-Display (ST7789 135x240)
    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_WIDTH=135
    -D TFT_HEIGHT=240
    -D CGRAM_OFFSET=1
    -D TFT_MOSI=19
    -D TFT_SCLK=18
    -D TFT_CS=5
    -D TFT_DC=16
    -D TFT_RST=23
    -D TFT_BL=4
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1


